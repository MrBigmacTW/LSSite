<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg4)"/>

  <!-- Fine grid (very subtle) -->
  <g stroke="#2a2a2a" stroke-width="0.4">
    <!-- Vertical lines every 30px -->
    <line x1="30" y1="0" x2="30" y2="800"/>
    <line x1="60" y1="0" x2="60" y2="800"/>
    <line x1="90" y1="0" x2="90" y2="800"/>
    <line x1="120" y1="0" x2="120" y2="800"/>
    <line x1="150" y1="0" x2="150" y2="800"/>
    <line x1="180" y1="0" x2="180" y2="800"/>
    <line x1="210" y1="0" x2="210" y2="800"/>
    <line x1="240" y1="0" x2="240" y2="800"/>
    <line x1="270" y1="0" x2="270" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="330" y1="0" x2="330" y2="800"/>
    <line x1="360" y1="0" x2="360" y2="800"/>
    <line x1="390" y1="0" x2="390" y2="800"/>
    <line x1="420" y1="0" x2="420" y2="800"/>
    <line x1="450" y1="0" x2="450" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/>
    <line x1="510" y1="0" x2="510" y2="800"/>
    <line x1="540" y1="0" x2="540" y2="800"/>
    <line x1="570" y1="0" x2="570" y2="800"/>
    <!-- Horizontal lines every 30px -->
    <line x1="0" y1="30" x2="600" y2="30"/>
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="90" x2="600" y2="90"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="210" x2="600" y2="210"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="330" x2="600" y2="330"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="0" y1="390" x2="600" y2="390"/>
    <line x1="0" y1="420" x2="600" y2="420"/>
    <line x1="0" y1="450" x2="600" y2="450"/>
    <line x1="0" y1="480" x2="600" y2="480"/>
    <line x1="0" y1="510" x2="600" y2="510"/>
    <line x1="0" y1="540" x2="600" y2="540"/>
    <line x1="0" y1="570" x2="600" y2="570"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="630" x2="600" y2="630"/>
    <line x1="0" y1="660" x2="600" y2="660"/>
    <line x1="0" y1="690" x2="600" y2="690"/>
    <line x1="0" y1="720" x2="600" y2="720"/>
    <line x1="0" y1="750" x2="600" y2="750"/>
    <line x1="0" y1="780" x2="600" y2="780"/>
  </g>

  <!-- Diagonal accent lines (white, sparse) -->
  <g stroke="white" stroke-width="0.6" opacity="0.08">
    <line x1="0" y1="0" x2="600" y2="800"/>
    <line x1="0" y1="100" x2="600" y2="900"/>
    <line x1="0" y1="-100" x2="600" y2="700"/>
    <line x1="600" y1="0" x2="0" y2="800"/>
    <line x1="600" y1="100" x2="0" y2="900"/>
  </g>

  <!-- Large geometric shapes — concentric rectangles -->
  <rect x="80" y="100" width="440" height="600" fill="none" stroke="white" stroke-width="0.8" opacity="0.12"/>
  <rect x="110" y="130" width="380" height="540" fill="none" stroke="white" stroke-width="0.6" opacity="0.1"/>
  <rect x="145" y="165" width="310" height="470" fill="none" stroke="#888" stroke-width="0.5" opacity="0.12"/>
  <rect x="180" y="200" width="240" height="400" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>

  <!-- Cross hair center -->
  <line x1="300" y1="340" x2="300" y2="460" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="240" y1="400" x2="360" y2="400" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <circle cx="300" cy="400" r="4" fill="none" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <circle cx="300" cy="400" r="12" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <circle cx="300" cy="400" r="28" fill="none" stroke="#555" stroke-width="0.4" opacity="0.2"/>
  <circle cx="300" cy="400" r="55" fill="none" stroke="#333" stroke-width="0.4" opacity="0.2"/>

  <!-- Thick white accent bars (horizontal) -->
  <rect x="0" y="395" width="220" height="1" fill="white" opacity="0.15"/>
  <rect x="380" y="395" width="220" height="1" fill="white" opacity="0.15"/>
  <rect x="0" y="405" width="220" height="1" fill="#666" opacity="0.1"/>
  <rect x="380" y="405" width="220" height="1" fill="#666" opacity="0.1"/>

  <!-- Vertical accent bars -->
  <rect x="295" y="0" width="1" height="340" fill="white" opacity="0.1"/>
  <rect x="305" y="0" width="1" height="340" fill="#555" opacity="0.08"/>
  <rect x="295" y="460" width="1" height="340" fill="white" opacity="0.1"/>
  <rect x="305" y="460" width="1" height="340" fill="#555" opacity="0.08"/>

  <!-- Geometric modules — top left quadrant -->
  <rect x="80" y="100" width="90" height="60" fill="#1a1a1a" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <rect x="80" y="100" width="45" height="30" fill="#222"/>
  <line x1="80" y1="130" x2="170" y2="130" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <line x1="125" y1="100" x2="125" y2="160" stroke="#555" stroke-width="0.5" opacity="0.5"/>

  <!-- Geometric modules — top right quadrant -->
  <rect x="430" y="100" width="90" height="60" fill="#1a1a1a" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <rect x="475" y="100" width="45" height="30" fill="#222"/>
  <line x1="430" y1="130" x2="520" y2="130" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <line x1="475" y1="100" x2="475" y2="160" stroke="#555" stroke-width="0.5" opacity="0.5"/>

  <!-- Geometric modules — bottom left -->
  <rect x="80" y="640" width="90" height="60" fill="#1a1a1a" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="670" x2="170" y2="670" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <line x1="125" y1="640" x2="125" y2="700" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <rect x="80" y="670" width="45" height="30" fill="#222"/>

  <!-- Geometric modules — bottom right -->
  <rect x="430" y="640" width="90" height="60" fill="#1a1a1a" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <line x1="430" y1="670" x2="520" y2="670" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <line x1="475" y1="640" x2="475" y2="700" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <rect x="475" y="670" width="45" height="30" fill="#222"/>

  <!-- White rule lines — editorial feel -->
  <line x1="60" y1="380" x2="60" y2="420" stroke="white" stroke-width="2" opacity="0.25"/>
  <line x1="540" y1="380" x2="540" y2="420" stroke="white" stroke-width="2" opacity="0.25"/>

  <!-- Large thin strokes across center -->
  <line x1="60" y1="290" x2="540" y2="290" stroke="white" stroke-width="0.5" opacity="0.12"/>
  <line x1="60" y1="510" x2="540" y2="510" stroke="white" stroke-width="0.5" opacity="0.12"/>

  <!-- Minimal label -->
  <text x="300" y="755" text-anchor="middle" font-family="monospace" font-size="9" fill="white" opacity="0.25" letter-spacing="6">WHITE · GREY · MINIMAL</text>
</svg>
