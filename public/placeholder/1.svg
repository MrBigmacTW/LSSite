<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a6fff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a6fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg1)"/>

  <!-- Deep space glow blobs -->
  <ellipse cx="300" cy="400" rx="280" ry="200" fill="url(#glow2)" filter="url(#blur1)"/>
  <ellipse cx="300" cy="320" rx="160" ry="120" fill="url(#glow1)" filter="url(#blur1)"/>

  <!-- Star field -->
  <g fill="white">
    <circle cx="45" cy="30" r="0.8" opacity="0.9"/>
    <circle cx="120" cy="75" r="1.2" opacity="0.7"/>
    <circle cx="200" cy="20" r="0.6" opacity="0.8"/>
    <circle cx="280" cy="55" r="1" opacity="0.6"/>
    <circle cx="360" cy="15" r="0.8" opacity="0.9"/>
    <circle cx="450" cy="40" r="1.1" opacity="0.7"/>
    <circle cx="530" cy="80" r="0.7" opacity="0.8"/>
    <circle cx="570" cy="30" r="1" opacity="0.6"/>
    <circle cx="80" cy="140" r="0.9" opacity="0.7"/>
    <circle cx="180" cy="110" r="0.6" opacity="0.9"/>
    <circle cx="310" cy="130" r="1.2" opacity="0.5"/>
    <circle cx="410" cy="95" r="0.8" opacity="0.8"/>
    <circle cx="510" cy="120" r="1" opacity="0.7"/>
    <circle cx="30" cy="200" r="1.1" opacity="0.6"/>
    <circle cx="150" cy="220" r="0.7" opacity="0.8"/>
    <circle cx="490" cy="180" r="0.9" opacity="0.7"/>
    <circle cx="560" cy="210" r="0.6" opacity="0.9"/>
    <circle cx="20" cy="310" r="0.8" opacity="0.7"/>
    <circle cx="580" cy="350" r="1" opacity="0.6"/>
    <circle cx="55" cy="500" r="0.7" opacity="0.8"/>
    <circle cx="545" cy="480" r="0.9" opacity="0.7"/>
    <circle cx="25" cy="650" r="1" opacity="0.6"/>
    <circle cx="575" cy="620" r="0.8" opacity="0.8"/>
    <circle cx="90" cy="720" r="0.7" opacity="0.7"/>
    <circle cx="500" cy="700" r="1.1" opacity="0.6"/>
    <circle cx="200" cy="750" r="0.8" opacity="0.8"/>
    <circle cx="380" cy="770" r="0.6" opacity="0.7"/>
  </g>

  <!-- Large outer orbit ring -->
  <ellipse cx="300" cy="420" rx="240" ry="90" fill="none" stroke="#1a5aff" stroke-width="0.5" opacity="0.3"/>
  <!-- Middle orbit -->
  <ellipse cx="300" cy="400" rx="170" ry="60" fill="none" stroke="#00d4ff" stroke-width="0.7" opacity="0.4"/>
  <!-- Inner orbit -->
  <ellipse cx="300" cy="390" rx="100" ry="35" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Whale silhouette — abstract, low-poly style -->
  <g transform="translate(300,395)" opacity="0.85">
    <!-- Body -->
    <path d="M-130,-18 C-110,-40 -60,-55 0,-50 C60,-45 110,-30 140,-10 C160,5 155,25 130,35 C100,45 50,48 0,45 C-60,42 -110,30 -130,18 Z"
          fill="#0a2a6e" stroke="#1a5aff" stroke-width="1"/>
    <!-- Belly highlight -->
    <path d="M-80,15 C-40,30 40,30 100,15 C80,35 30,42 0,42 C-40,42 -70,32 -80,15 Z"
          fill="#0d3a8a" opacity="0.6"/>
    <!-- Fluke / tail -->
    <path d="M125,10 C140,-5 165,-20 155,-35 C148,-45 138,-35 130,-22 C122,-10 118,5 125,10 Z"
          fill="#0a2a6e" stroke="#1a5aff" stroke-width="1"/>
    <path d="M125,10 C140,25 165,38 155,50 C148,58 135,48 128,35 C121,22 118,15 125,10 Z"
          fill="#0a2a6e" stroke="#1a5aff" stroke-width="1"/>
    <!-- Pectoral fin -->
    <path d="M-30,-42 C10,-70 50,-75 60,-55 C45,-45 10,-38 -30,-42 Z"
          fill="#0c3580" stroke="#1a6fff" stroke-width="0.8"/>
    <!-- Eye -->
    <circle cx="-75" cy="-5" r="6" fill="#001833"/>
    <circle cx="-75" cy="-5" r="4" fill="#00d4ff" opacity="0.8"/>
    <circle cx="-73" cy="-7" r="1.5" fill="white" opacity="0.9"/>
    <!-- Blowhole spray lines -->
    <line x1="-20" y1="-52" x2="-25" y2="-90" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-15" y1="-52" x2="-10" y2="-95" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="-10" y1="-53" x2="5" y2="-88" stroke="#00d4ff" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Bioluminescent dots near whale -->
  <g fill="#00d4ff" opacity="0.6">
    <circle cx="170" cy="440" r="2"/>
    <circle cx="185" cy="455" r="1.2"/>
    <circle cx="155" cy="460" r="1.5"/>
    <circle cx="420" cy="435" r="1.8"/>
    <circle cx="440" cy="450" r="1.2"/>
    <circle cx="410" cy="455" r="2"/>
    <circle cx="300" cy="480" r="1.5"/>
    <circle cx="280" cy="490" r="1"/>
    <circle cx="320" cy="488" r="1.2"/>
  </g>

  <!-- Bottom ocean depth gradient bar -->
  <defs>
    <linearGradient id="oceanFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect x="0" y="550" width="600" height="250" fill="url(#oceanFloor)"/>

  <!-- Horizontal scan lines (subtle) -->
  <g stroke="#00d4ff" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="560" x2="600" y2="560"/>
    <line x1="0" y1="580" x2="600" y2="580"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="620" x2="600" y2="620"/>
    <line x1="0" y1="640" x2="600" y2="640"/>
    <line x1="0" y1="660" x2="600" y2="660"/>
    <line x1="0" y1="680" x2="600" y2="680"/>
    <line x1="0" y1="700" x2="600" y2="700"/>
    <line x1="0" y1="720" x2="600" y2="720"/>
    <line x1="0" y1="740" x2="600" y2="740"/>
    <line x1="0" y1="760" x2="600" y2="760"/>
  </g>

  <!-- Top text label -->
  <text x="300" y="755" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.5" letter-spacing="4">DEEP BLUE / COSMIC</text>
</svg>
