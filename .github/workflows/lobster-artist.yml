name: 🦞 龍蝦藝術家

on:
  # 每小時整點檢查排程（台灣 8:00-00:00）
  schedule:
    - cron: '0 0-16 * * *'  # UTC 0-16 = 台灣 8:00-00:00（涵蓋所有合理排程時段）

  # 手動觸發
  workflow_dispatch:
    inputs:
      count:
        description: '生成數量'
        default: '3'
      style:
        description: '風格（留空=隨機）'
        default: ''
      price:
        description: '售價'
        default: '1280'
      prompt:
        description: 'AI 指示'
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安裝 Sharp（圖片壓縮）
        working-directory: lobster-artist
        run: npm install sharp 2>/dev/null || echo "sharp install skipped"

      - name: 🦞 執行
        working-directory: lobster-artist
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          LOBSTER_API_KEY: ${{ secrets.LOBSTER_API_KEY }}
          LOBSTER_API_URL: https://ls-site-seven.vercel.app/api/products
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_SHEET_WEBHOOK: ${{ secrets.GOOGLE_SHEET_WEBHOOK }}
          SCHEDULE_API_URL: https://ls-site-seven.vercel.app/api/schedules
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COUNT=${{ github.event.inputs.count || '3' }}
            STYLE="${{ github.event.inputs.style || '' }}"
            PRICE=${{ github.event.inputs.price || '1280' }}
            PROMPT="${{ github.event.inputs.prompt || '' }}"

            ARGS="-n $COUNT -p $PRICE"
            [ -n "$STYLE" ] && ARGS="$ARGS -s $STYLE"
            [ -n "$PROMPT" ] && export AI_PROMPT="$PROMPT"

            echo "🦞 手動觸發: $ARGS"
            node lobster_upload.js $ARGS
          else
            CURRENT_HOUR=$(TZ=Asia/Taipei date +%-H)
            echo "🕐 台灣時間: $(TZ=Asia/Taipei date '+%H:%M') (hour=$CURRENT_HOUR)"

            SCHEDULES=$(curl -sf "${SCHEDULE_API_URL}?hour=${CURRENT_HOUR}" || echo '{"schedules":[]}')
            SCOUNT=$(echo "$SCHEDULES" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('schedules',[])))" 2>/dev/null || echo "0")

            if [ "$SCOUNT" = "0" ]; then
              echo "😴 這個時段沒有排程，跳過"
              exit 0
            fi

            echo "📋 找到 $SCOUNT 個排程"

            echo "$SCHEDULES" | python3 -c "
          import sys, json
          for s in json.load(sys.stdin).get('schedules', []):
              print(f\"{s.get('name','')}\t{s.get('count',3)}\t{s.get('style','')}\t{s.get('price',1280)}\t{s.get('prompt','')}\")
          " | while IFS=$'\t' read -r NAME N STYLE PRICE PROMPT; do
              echo ""
              echo "🦞 排程: $NAME ($STYLE, $N 張)"
              ARGS="-n $N -p $PRICE"
              [ -n "$STYLE" ] && ARGS="$ARGS -s $STYLE"
              [ -n "$PROMPT" ] && export AI_PROMPT="$PROMPT"
              node lobster_upload.js $ARGS || echo "⚠️ $NAME 執行失敗（不中斷）"
              sleep 5
            done
          fi

      - name: 保存記錄
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lobster-output-${{ github.run_number }}
          path: lobster-artist/lobster_output/
          retention-days: 7
