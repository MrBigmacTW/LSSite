name: 🦞 龍蝦藝術家

on:
  # 每小時檢查一次排程
  schedule:
    - cron: '0 * * * *'  # 每小時整點

  # 手動觸發
  workflow_dispatch:
    inputs:
      count:
        description: '生成數量'
        default: '3'
      style:
        description: '風格（留空=隨機）'
        default: ''
      price:
        description: '售價'
        default: '1280'
      prompt:
        description: 'AI 指示'
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🦞 檢查排程並執行
        working-directory: lobster-artist
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          LOBSTER_API_KEY: ${{ secrets.LOBSTER_API_KEY }}
          LOBSTER_API_URL: https://ls-site-seven.vercel.app/api/products
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SCHEDULE_API_URL: https://ls-site-seven.vercel.app/api/schedules
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手動觸發：用輸入的參數
            COUNT=${{ github.event.inputs.count || '3' }}
            STYLE="${{ github.event.inputs.style || '' }}"
            PRICE=${{ github.event.inputs.price || '1280' }}
            PROMPT="${{ github.event.inputs.prompt || '' }}"

            ARGS="-n $COUNT -p $PRICE"
            [ -n "$STYLE" ] && ARGS="$ARGS -s $STYLE"
            [ -n "$PROMPT" ] && export AI_PROMPT="$PROMPT"

            echo "🦞 手動觸發: $ARGS"
            node lobster_upload.js $ARGS
          else
            # 排程觸發：查詢當前小時的排程
            CURRENT_HOUR=$(TZ=Asia/Taipei date +%H | sed 's/^0//')
            echo "🕐 台灣時間: $(TZ=Asia/Taipei date '+%H:%M') (hour=$CURRENT_HOUR)"

            SCHEDULES=$(curl -s "${SCHEDULE_API_URL}?hour=${CURRENT_HOUR}")
            COUNT=$(echo "$SCHEDULES" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('schedules',[])))")

            if [ "$COUNT" = "0" ]; then
              echo "😴 這個時段沒有排程，跳過"
              exit 0
            fi

            echo "📋 找到 $COUNT 個排程"

            # 逐個執行
            echo "$SCHEDULES" | python3 -c "
import sys, json
schedules = json.load(sys.stdin).get('schedules', [])
for s in schedules:
    print(f\"{s.get('name','')}|{s.get('count',3)}|{s.get('style','')}|{s.get('price',1280)}|{s.get('prompt','')}\")
" | while IFS='|' read -r NAME N STYLE PRICE PROMPT; do
              echo ""
              echo "🦞 執行排程: $NAME ($STYLE, $N 張)"
              ARGS="-n $N -s $STYLE -p $PRICE"
              [ -n "$PROMPT" ] && export AI_PROMPT="$PROMPT"
              node lobster_upload.js $ARGS || echo "⚠️ $NAME 執行失敗"
              sleep 5
            done
          fi

      - name: 保存生成記錄
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lobster-output-${{ github.run_number }}
          path: lobster-artist/lobster_output/
          retention-days: 7
